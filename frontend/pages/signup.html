<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SAS University</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card fade-in" style="max-width: 500px;">
                <div class="auth-logo">
                    <h1>SAS</h1>
                    <p>Student Academic System Registration</p>
                </div>
                
                <form id="signupForm">
                    <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px; text-align: center;">
                        Submit your details below. Once approved by administration, your National ID will serve as your temporary password.
                    </p>

                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-input" id="name" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">National ID *</label>
                        <input type="text" class="form-input" id="nationalId" placeholder="Enter your 10-digit National ID" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-input" id="phone" placeholder="e.g. 09123456789">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-input" id="dob">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Home Address</label>
                        <input type="text" class="form-input" id="address" placeholder="Enter your full address">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 10px;">
                        Submit Request
                    </button>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a href="../index.html">Sign in here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const BASE_URL = `http://${window.location.hostname}:3000/api`;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            const payload = {
                name: document.getElementById('name').value.trim(),
                national_id: document.getElementById('nationalId').value.trim(),
                phone_number: document.getElementById('phone').value.trim() || null,
                date_of_birth: document.getElementById('dob').value || null,
                address: document.getElementById('address').value.trim() || null
            };

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                const response = await fetch(`${BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    if (typeof showToast === 'function') {
                        showToast('Request submitted successfully! Waiting for admin approval.', 'success');
                    } else {
                        alert('Request submitted successfully! Waiting for admin approval.');
                    }
                    // Redirect back to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    let errorMsg = data.detail || 'Failed to submit request';
                    if (Array.isArray(errorMsg)) {
                        errorMsg = errorMsg.map(err => `${err.loc[err.loc.length-1]}: ${err.msg}`).join(' | ');
                    }
                    throw new Error(errorMsg);
                }
            } catch (error) {
                if (typeof showToast === 'function') {
                    showToast(error.message, 'error');
                } else {
                    alert(error.message);
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Request';
            }
        });
    </script>
</body>
</html>
