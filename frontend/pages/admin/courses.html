<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses - Admin Portal</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">SAS</div>
                <div>
                    <div class="logo-text">SAS University</div>
                    <div class="logo-sub">Admin Portal</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="profile.html"><span class="nav-icon">👤</span> Profile</a></li>
                <li><a href="courses.html" class="active"><span class="nav-icon">📚</span> All Courses</a></li>
                <li><a href="students.html"><span class="nav-icon">🎓</span> All Students</a></li>
                <li><a href="professors.html"><span class="nav-icon">👨‍🏫</span> Instructors</a></li>
                <li><a href="requests.html"><span class="nav-icon">📝</span> Requests</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="sidebar-avatar">A</div>
                <div>
                    <div class="user-name" id="sidebar-name">Admin</div>
                    <div class="user-role" id="sidebar-role">Manager</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">All Courses & Instructors</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div class="search-bar" style="max-width: 400px; flex-grow: 1;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="courseSearch" placeholder="Search courses by name or code...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="openModal('addCourseModal'); isEditMode = false;">+ Add Course</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table" id="coursesTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Course Name</th>
                            <th>Instructor</th>
                            <th>Credits</th>
                            <th>Dates & Deadlines</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows will be dynamically injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Expanded Add/Edit Course Modal -->
    <div class="modal-overlay" id="addCourseModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle">Course Details</h3>
                <button class="modal-close" onclick="closeModal('addCourseModal')">&times;</button>
            </div>
            <div class="modal-body" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label">Course Code (ID)</label>
                    <input type="text" id="courseCode" class="form-input" placeholder="e.g. CE-103">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label">Course Name</label>
                    <input type="text" id="courseName" class="form-input" placeholder="e.g. Database Systems">
                </div>
                <div class="form-group">
                    <label class="form-label">Instructor</label>
                    <select id="courseProfessor" class="form-select"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Units / Credits</label>
                    <input type="number" id="courseUnits" class="form-input" placeholder="3">
                </div>
                <div class="form-group">
                    <label class="form-label">Selection Deadline</label>
                    <input type="date" id="courseDeadline" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Exam Date</label>
                    <input type="date" id="courseExam" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Course Start Date</label>
                    <input type="date" id="courseStart" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Course End Date</label>
                    <input type="date" id="courseEnd" class="form-input">
                </div>
                <div class="form-group" style="grid-column: span 2; display: flex; gap: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="courseActive" checked> Course is Active (Enrollment Open)
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="courseHidden"> Hide from Students
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addCourseModal')">Cancel</button>
                <button class="btn btn-primary" id="saveCourseBtn">Save Course</button>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script type="module">
        import api from '../../js/api.js';

        const BASE_URL = `http://${window.location.hostname}:3000/api`;
        
        const customFetch = async (endpoint, method, body = null) => {
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${BASE_URL}${endpoint}`, options);
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                let errorMsg = err.detail || 'Server Error';
                
                if (Array.isArray(errorMsg)) {
                    errorMsg = errorMsg.map(e => `${e.loc[e.loc.length-1]}: ${e.msg}`).join(' | ');
                } else if (typeof errorMsg === 'object') {
                    errorMsg = JSON.stringify(errorMsg);
                }
                
                throw new Error(errorMsg);
            }
            return response.json();
        };

        const tableBody = document.querySelector('#coursesTable tbody');
        window.isEditMode = false; 

        async function loadProfessors() {
            try {
                const professors = await customFetch('/admin/professors', 'GET');
                const profSelect = document.getElementById('courseProfessor');
                profSelect.innerHTML = '<option value="">Select Instructor</option>';
                
                professors.forEach(prof => {
                    const opt = document.createElement('option');
                    opt.value = prof.id;
                    opt.textContent = prof.name;
                    profSelect.appendChild(opt);
                });
            } catch (error) {
                console.error("Failed to load professors", error);
            }
        }

        async function loadCourses() {
            try {
                const courses = await customFetch('/admin/all-courses', 'GET');
                tableBody.innerHTML = ''; 
                if (courses.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No courses found.</td></tr>';
                    return;
                }

                courses.forEach(c => {
                    const visibility = c.is_hidden ? '<span style="color:red; font-size:12px;">(Hidden)</span>' : '';
                    const statusClass = c.is_active ? 'active' : 'pending';
                    const statusText = c.is_active ? 'Active' : 'Disabled';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${c.id}</strong> <br>${visibility}</td>
                        <td>${c.name}</td>
                        <td>${c.professor}</td>
                        <td>${c.credits}</td>
                        <td style="font-size:12px;">
                            Start: ${c.start_date || '-'}<br>
                            Deadline: ${c.selection_deadline || '-'}
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn btn-sm btn-secondary edit-btn" data-full='${JSON.stringify(c)}'>✏️</button>
                            <button class="btn btn-sm btn-danger delete-btn" data-id="${c.id}">🗑️</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                attachActionListeners();
            } catch (error) {
                if(typeof showToast === 'function') showToast('Failed to load courses', 'error');
            }
        }

        function attachActionListeners() {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm('Are you sure you want to delete this course?')) {
                        try {
                            await customFetch(`/admin/courses/${e.target.dataset.id}`, 'DELETE');
                            if(typeof showToast === 'function') showToast('Course deleted', 'success');
                            loadCourses(); 
                        } catch (err) {
                            if(typeof showToast === 'function') showToast(err.message, 'error');
                        }
                    }
                });
            });

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const c = JSON.parse(e.target.dataset.full);
                    window.isEditMode = true;
                    document.getElementById('modalTitle').textContent = 'Edit Course';
                    document.getElementById('courseCode').value = c.id;
                    document.getElementById('courseCode').disabled = true; 
                    document.getElementById('courseName').value = c.name;
                    document.getElementById('courseUnits').value = c.credits;
                    
                    if (c.professor && c.professor !== "Unassigned") {
                        const profSelect = document.getElementById('courseProfessor');
                        for(let i=0; i < profSelect.options.length; i++) {
                            if(profSelect.options[i].text === c.professor) {
                                profSelect.selectedIndex = i;
                                break;
                            }
                        }
                    } else {
                        document.getElementById('courseProfessor').value = ""; 
                    }
                    
                    document.getElementById('courseDeadline').value = c.selection_deadline || '';
                    document.getElementById('courseExam').value = c.exam_day || '';
                    document.getElementById('courseStart').value = c.start_date || '';
                    document.getElementById('courseEnd').value = c.end_date || '';
                    document.getElementById('courseActive').checked = c.is_active !== false; 
                    document.getElementById('courseHidden').checked = c.is_hidden === true; 
                    document.getElementById('addCourseModal').classList.add('active');
                });
            });
        }

        document.getElementById('saveCourseBtn').addEventListener('click', async () => {
            const payload = {
                id: document.getElementById('courseCode').value.trim(),
                name: document.getElementById('courseName').value.trim(),
                credits: parseInt(document.getElementById('courseUnits').value) || 3,
                professor_id: parseInt(document.getElementById('courseProfessor').value) || null,
                selection_deadline: document.getElementById('courseDeadline').value,
                start_date: document.getElementById('courseStart').value,
                end_date: document.getElementById('courseEnd').value,
                exam_day: document.getElementById('courseExam').value,
                is_active: document.getElementById('courseActive').checked,
                is_hidden: document.getElementById('courseHidden').checked
            };

            if (!payload.id || !payload.name) {
                if(typeof showToast === 'function') showToast('Please fill in required fields', 'warning');
                return;
            }

            try {
                if (window.isEditMode) {
                    await customFetch(`/admin/courses/${payload.id}`, 'PUT', payload);
                    if(typeof showToast === 'function') showToast('Course updated', 'success');
                } else {
                    await customFetch('/admin/courses', 'POST', payload);
                    if(typeof showToast === 'function') showToast('Course added', 'success');
                }
                closeModal('addCourseModal');
                loadCourses();
            } catch (error) {
                if(typeof showToast === 'function') showToast(error.message, 'error');
            }
        });

        const originalOpenModal = window.openModal;
        window.openModal = function(id) {
            if(id === 'addCourseModal' && !window.isEditMode) {
                document.getElementById('modalTitle').textContent = 'Add New Course';
                document.getElementById('courseCode').disabled = false;
                document.getElementById('courseCode').value = '';
                document.getElementById('courseName').value = '';
                document.getElementById('courseUnits').value = '';
                document.getElementById('courseProfessor').value = '';
                document.getElementById('courseDeadline').value = '';
                document.getElementById('courseExam').value = '';
                document.getElementById('courseStart').value = '';
                document.getElementById('courseEnd').value = '';
                document.getElementById('courseActive').checked = true;
                document.getElementById('courseHidden').checked = false;
            }
            if (originalOpenModal) originalOpenModal(id);
            else document.getElementById(id).classList.add('active');
        };

        document.getElementById('courseSearch').addEventListener('input', function() {
            const term = this.value.toLowerCase();
            document.querySelectorAll('#coursesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadProfessors();
            loadCourses();
        });
    </script>
</body>
</html>
