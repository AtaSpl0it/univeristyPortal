<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses - Admin Portal</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">SAS</div>
                <div>
                    <div class="logo-text">SAS University</div>
                    <div class="logo-sub">Admin Portal</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="profile.html"><span class="nav-icon">👤</span> Profile</a></li>
                <li><a href="courses.html" class="active"><span class="nav-icon">📚</span> All Courses</a></li>
                <li><a href="students.html"><span class="nav-icon">🎓</span> All Students</a></li>
                <li><a href="requests.html"><span class="nav-icon">📝</span> Signup Requests</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="sidebar-avatar">A</div>
                <div>
                    <div class="user-name" id="sidebar-name">Admin</div>
                    <div class="user-role" id="sidebar-role">Manager</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">All Courses & Instructors</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div class="search-bar" style="max-width: 400px; flex-grow: 1;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="courseSearch" placeholder="Search courses by name or code...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="openModal('addProfessorModal')">+ Add Instructor</button>
                    <button class="btn btn-primary" onclick="openModal('addCourseModal'); isEditMode = false;">+ Add Course</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table" id="coursesTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Course Name</th>
                            <th>Instructor</th>
                            <th>Credits</th>
                            <th>Students</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows will be dynamically injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Course Modal -->
    <div class="modal-overlay" id="addCourseModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Course Details</h3>
                <button class="modal-close" onclick="closeModal('addCourseModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Course Code (ID)</label>
                    <input type="text" id="courseCode" class="form-input" placeholder="e.g. CE-103">
                </div>
                <div class="form-group">
                    <label class="form-label">Course Name</label>
                    <input type="text" id="courseName" class="form-input" placeholder="e.g. Database Systems">
                </div>
                <div class="form-group">
                    <label class="form-label">Instructor</label>
                    <select id="courseProfessor" class="form-select">
                        <option value="">Select Instructor</option>
                        <!-- Professor options injected dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Units / Credits</label>
                    <input type="number" id="courseUnits" class="form-input" placeholder="3">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addCourseModal')">Cancel</button>
                <button class="btn btn-primary" id="saveCourseBtn">Save Course</button>
            </div>
        </div>
    </div>

    <!-- Add Professor Modal -->
    <div class="modal-overlay" id="addProfessorModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Instructor</h3>
                <button class="modal-close" onclick="closeModal('addProfessorModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="profName" class="form-input" placeholder="e.g. Dr. Sarah Connor">
                </div>
                <div class="form-group">
                    <label class="form-label">Login Username</label>
                    <input type="text" id="profUsername" class="form-input" placeholder="e.g. sarah_connor">
                </div>
                <div class="form-group">
                    <label class="form-label">Temporary Password</label>
                    <input type="password" id="profPassword" class="form-input" placeholder="Enter a secure password">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addProfessorModal')">Cancel</button>
                <button class="btn btn-primary" id="saveProfessorBtn">Save Instructor</button>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script type="module">
        import api from '../../js/api.js';

        const BASE_URL = 'http://localhost:3000/api';
        
        // Advanced fetch wrapper that properly parses FastAPI 422 Errors
        const customFetch = async (endpoint, method, body = null) => {
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${BASE_URL}${endpoint}`, options);
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                let errorMsg = err.detail || 'Server Error';
                
                // If FastAPI returned an array of validation errors, parse it cleanly
                if (Array.isArray(errorMsg)) {
                    errorMsg = errorMsg.map(e => `${e.loc[e.loc.length-1]}: ${e.msg}`).join(' | ');
                } else if (typeof errorMsg === 'object') {
                    errorMsg = JSON.stringify(errorMsg);
                }
                
                throw new Error(errorMsg);
            }
            return response.json();
        };

        const tableBody = document.querySelector('#coursesTable tbody');
        window.isEditMode = false; 

        // 1. Fetch Professors
        async function loadProfessors() {
            try {
                const professors = await api.get('/admin/professors');
                const profSelect = document.getElementById('courseProfessor');
                profSelect.innerHTML = '<option value="">Select Instructor</option>';
                
                professors.forEach(prof => {
                    const opt = document.createElement('option');
                    opt.value = prof.id;
                    opt.textContent = prof.name;
                    profSelect.appendChild(opt);
                });
            } catch (error) {
                console.error("Failed to load professors", error);
            }
        }

        // 2. Load Courses
        async function loadCourses() {
            try {
                const courses = await api.get('/admin/all-courses');
                tableBody.innerHTML = ''; 

                if (courses.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No courses found.</td></tr>';
                    return;
                }

                courses.forEach(course => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${course.id}</strong></td>
                        <td>${course.name}</td>
                        <td>${course.professor}</td>
                        <td>${course.credits}</td>
                        <td>${course.students}</td>
                        <td><span class="status-badge active">${course.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-secondary edit-btn" data-id="${course.id}" data-name="${course.name}" data-credits="${course.credits}" data-prof="${course.professor}">✏️</button>
                            <button class="btn btn-sm btn-danger delete-btn" data-id="${course.id}">🗑️</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                attachActionListeners();
            } catch (error) {
                showToast('Failed to load courses', 'error');
            }
        }

        // 3. Attach Listeners 
        function attachActionListeners() {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm('Are you sure you want to delete this course?')) {
                        try {
                            await customFetch(`/admin/courses/${e.target.dataset.id}`, 'DELETE');
                            showToast('Course deleted', 'success');
                            loadCourses(); 
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    }
                });
            });

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    window.isEditMode = true;
                    document.getElementById('modalTitle').textContent = 'Edit Course';
                    document.getElementById('courseCode').value = e.target.dataset.id;
                    document.getElementById('courseCode').disabled = true; 
                    document.getElementById('courseName').value = e.target.dataset.name;
                    document.getElementById('courseUnits').value = e.target.dataset.credits;
                    document.getElementById('courseProfessor').value = ""; 
                    document.getElementById('addCourseModal').classList.add('active');
                });
            });
        }

        // 4. Save/Update Course
        document.getElementById('saveCourseBtn').addEventListener('click', async () => {
            const payload = {
                id: document.getElementById('courseCode').value.trim(),
                name: document.getElementById('courseName').value.trim(),
                credits: parseInt(document.getElementById('courseUnits').value) || 3,
                professor_id: parseInt(document.getElementById('courseProfessor').value) || null
            };

            if (!payload.id || !payload.name) {
                showToast('Please fill in required fields', 'warning');
                return;
            }

            try {
                if (window.isEditMode) {
                    await customFetch(`/admin/courses/${payload.id}`, 'PUT', payload);
                    showToast('Course updated', 'success');
                } else {
                    await customFetch('/admin/courses', 'POST', payload); // Pointing to our new robust endpoint
                    showToast('Course added', 'success');
                }
                closeModal('addCourseModal');
                loadCourses();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // 5. Save New Professor
        document.getElementById('saveProfessorBtn').addEventListener('click', async () => {
            const payload = {
                name: document.getElementById('profName').value.trim(),
                username: document.getElementById('profUsername').value.trim(),
                password: document.getElementById('profPassword').value
            };

            if (!payload.name || !payload.username || !payload.password) {
                showToast('All fields are required', 'warning');
                return;
            }

            try {
                await customFetch('/admin/professors', 'POST', payload);
                showToast('Instructor added successfully', 'success');
                closeModal('addProfessorModal');
                
                // Clear the form
                document.getElementById('profName').value = '';
                document.getElementById('profUsername').value = '';
                document.getElementById('profPassword').value = '';
                
                // Reload the dropdowns
                loadProfessors();
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // 6. Reset Modal logic
        const originalOpenModal = window.openModal;
        window.openModal = function(id) {
            if(id === 'addCourseModal' && !window.isEditMode) {
                document.getElementById('modalTitle').textContent = 'Add New Course';
                document.getElementById('courseCode').disabled = false;
                document.getElementById('courseCode').value = '';
                document.getElementById('courseName').value = '';
                document.getElementById('courseUnits').value = '';
                document.getElementById('courseProfessor').value = '';
            }
            if (originalOpenModal) originalOpenModal(id);
            else document.getElementById(id).classList.add('active');
        };

        // 7. Search filter logic
        document.getElementById('courseSearch').addEventListener('input', function() {
            const term = this.value.toLowerCase();
            document.querySelectorAll('#coursesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadProfessors();
            loadCourses();
        });
    </script>
</body>
</html>
