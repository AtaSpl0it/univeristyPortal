<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - SAS University</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">SAS</div>
                <div>
                    <div class="logo-text">SAS University</div>
                    <div class="logo-sub">Professor Portal</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a></li>
                <li><a href="profile.html"><span class="nav-icon">👤</span> Profile</a></li>
                <li><a href="courses.html" class="active"><span class="nav-icon">📚</span> My Courses</a></li>
                <li><a href="enrollment.html"><span class="nav-icon">📝</span> Enrollment</a></li>
                <li><a href="schedule.html"><span class="nav-icon">📅</span> Schedule</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">My Courses</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="content-body">
            <div class="search-bar" style="margin-bottom: 24px; max-width: 500px;">
                <span class="search-icon">🔍</span>
                <input type="text" id="courseSearch" placeholder="Search courses...">
            </div>

            <div class="table-container">
                <table class="data-table" id="coursesTable">
                    <thead>
                        <tr>
                            <th>Course ID</th>
                            <th>Course Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTableBody">
                        <!-- Loading State -->
                        <tr><td colspan="3" style="text-align: center;">Loading courses...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/main.js"></script>
    <script type="module">
        import api from '../../js/api.js';

        window.logout = function() {
            localStorage.clear();
            window.location.href = '/'; 
        };

        async function loadCourses() {
            const tableBody = document.getElementById('coursesTableBody');
            try {
                const courses = await api.get('/professor/courses');
                tableBody.innerHTML = '';

                if(courses.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No courses assigned to you yet.</td></tr>';
                    return;
                }

                courses.forEach(course => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${course.code}</strong></td>
                        <td>${course.name}</td>
                        <td>
                            <a href="course-detail.html?id=${course.id}" class="btn btn-sm btn-primary">👁️ View Roster & Grade</a>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch(e) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: red;">Failed to load data.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
</body>
</html>
