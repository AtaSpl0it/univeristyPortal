<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAS University</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card fade-in">
                <div class="auth-logo">
                    <h1>SAS</h1>
                    <p>SAS University - Student Academic System</p>
                </div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁️</button>
                        </div>
                    </div>
                    
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text-secondary);">
                            <input type="checkbox" style="width: 16px; height: 16px;">
                            Remember me
                        </label>
                        <a href="#" onclick="openModal('forgotPasswordModal')" style="font-size: 14px; color: var(--accent-secondary);">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Sign In
                    </button>
                </form>
                
                <div class="auth-footer">
                    Don't have an account? <a href="pages/signup.html">Create an account</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotPasswordModal">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <button class="modal-close" onclick="closeModal('forgotPasswordModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px;">
                    Enter your username to request a password reset. If approved by an admin, your password will be reset to your National ID.
                </p>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="resetUsername" class="form-input" placeholder="Enter your username">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('forgotPasswordModal')">Cancel</button>
                <button class="btn btn-primary" onclick="submitPasswordReset()">Submit Request</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module">
        import auth from './js/auth.js';

        if (localStorage.getItem('token') && localStorage.getItem('user_role')) {
            auth.redirectToDashboard(localStorage.getItem('user_role'));
        }

        const form = document.getElementById('loginForm');
        const BASE_URL = `http://${window.location.hostname}:3000/api`;

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                await auth.login(username, password);
            } catch (error) {
                console.error("Login Integration Error:", error);
                if (typeof showToast === 'function') {
                    showToast('Invalid username or password.', 'error');
                } else {
                    alert('Invalid username or password.');
                }
            }
        });

        window.submitPasswordReset = async function() {
            const username = document.getElementById('resetUsername').value.trim();
            if (!username) {
                if(typeof showToast === 'function') showToast('Please enter your username', 'warning');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });

                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.detail || 'Server Error');
                }

                if(typeof showToast === 'function') showToast(result.message, 'success');
                closeModal('forgotPasswordModal');
                document.getElementById('resetUsername').value = '';
                
            } catch (error) {
                if(typeof showToast === 'function') showToast(error.message, 'error');
            }
        };
    </script>
</body>
</html>
